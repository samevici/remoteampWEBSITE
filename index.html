<!DOCTYPE html>
<html>
    <head>
        <title>REMOTEFX Control</title>

        <script>

        function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

        async function insertValues(field) {
                var xmlHttp = new XMLHttpRequest();
                xmlHttp.open("GET", "insertion.php?"+field+"="+document.getElementById(field).value, false);
                xmlHttp.send();
            }
        
         async function eepromWrite() {
                var xmlHttp = new XMLHttpRequest();
                xmlHttp.open("GET", "insertion.php?eepromw=1", false);
                xmlHttp.send();
                document.getElementById("EEPROMstatus").innerHTML = "Write OK!";

                await sleep(2000);

                xmlHttp.open("GET", "insertion.php?eepromw=0", false);
                xmlHttp.send();
                document.getElementById("EEPROMstatus").innerHTML = " ";
            }
        
        async function recording() {

                let status = document.getElementById("recordButton").value;
                if (status === "0")
                 {
                    document.getElementById("recordButton").value = "1";
                    document.getElementById("recordStatus").innerHTML = "RECORDING!";
                 }
                if (status === "1")
                 {
                    document.getElementById("recordButton").value = "0";
                    document.getElementById("recordStatus").innerHTML = "OFF";
                 }
               
                var xmlHttp = new XMLHttpRequest();
                xmlHttp.open("GET", "insertion.php?record="+document.getElementById("recordButton").value, false);
                xmlHttp.send();
            }

           async function refreshValues() {
                 var xmlHttp = new XMLHttpRequest();
                  xmlHttp.open("GET", "encodetable.php", false);
                  xmlHttp.send();
                  const result = JSON.parse(xmlHttp.responseText);

                  document.getElementById("hiRead").innerHTML = result.hi;
                  document.getElementById("bandRead").innerHTML = result.band;
                  document.getElementById("loRead").innerHTML = result.lo;
                  document.getElementById("rescutRead").innerHTML = result.rescut;
                  document.getElementById("resfeedRead").innerHTML = result.resfeed;
                  document.getElementById("distgainRead").innerHTML = result.distgain;
                  document.getElementById("distclipRead").innerHTML = result.distclip;
                  document.getElementById("volumeRead").innerHTML = result.volume;

            }

        </script> 
    </head>
    <body>
        <h1> REMOTEFX  Control</h1>
        
            <label for="hi"> High pass %: </label><input type="text" id="hi" name="hi"  value="50"/> <button onclick='insertValues("hi")'>Update</button> <p id="hiRead"> </p>
       
            <label for="band"> Band pass %: </label><input type="text" id="band" name="band" value="50"/> <button onclick='insertValues("band")'>Update</button> <p id="bandRead"></p>
       
            <label for="lo"> Low pass %: </label><input type="text" id="lo" name="lo" value="50"/> <button onclick='insertValues("lo")'>Update</button> <p id="loRead"></p>

            <label for="rescut"> Resonance cutoff %: </label><input type="text" id="rescut" name="rescut" value="50"/> <button onclick='insertValues("rescut")'>Update</button> <p id="rescutRead"></p>

            <label for="resfeed"> Resonance feedback %: </label><input type="text" id="resfeed" name="resfeed" value="50"/>  <button onclick='insertValues("resfeed")'>Update</button> <p id="resfeedRead"></p>

            <label for="distgain"> Distortion gain %: </label><input type="text" id="distgain" name="distgain" value="50" /> <button onclick='insertValues("distgain")'>Update</button> <p id="distgainRead"></p>

            <label for="distclip"> Distortion clipping %: </label><input type="text" id="distclip" name="distclip" value="50"/> <button onclick='insertValues("distclip")'>Update</button> <p id="distclipRead"></p>
      
            <label for="volume"> Volume %: </label><input type="text" id="volume" name="volume" value="50"/> <button onclick='insertValues("volume")'>Update</button> <p id="volumeRead"></p>

            <button onclick="eepromWrite()">EEPROMwrite</button>  <p id="EEPROMstatus"> </p>
            
            <button onclick="recording()" id="recordButton" value="0">Record</button> <p id="recordStatus">OFF</p> 

       <script>
        refreshValues();
        setInterval(refreshValues,500);
       </script>
       
    </body>
